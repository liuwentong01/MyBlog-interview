<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini-OpenClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f10;
      --surface: #1a1a1e;
      --surface2: #252529;
      --border: #2e2e35;
      --text: #e4e4e7;
      --text-dim: #8b8b94;
      --accent: #ef4444;
      --accent-hover: #dc2626;
      --user-bg: #1e3a5f;
      --ai-bg: #1e1e24;
      --tool-bg: #1c2a1c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo { font-size: 24px; }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
    }

    header .status .dot.connected { background: #22c55e; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .msg .tool-info {
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--tool-bg);
      border-radius: 6px;
      font-size: 12px;
      color: #86efac;
      border-left: 3px solid #22c55e;
    }

    .msg .meta {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .msg strong { color: var(--accent); }

    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }

    #input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-area input:focus { border-color: var(--accent); }

    #input-area input::placeholder { color: var(--text-dim); }

    #input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #input-area button:hover { background: var(--accent-hover); }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 14px;
      align-self: flex-start;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🦞</span>
  <h1>Mini-OpenClaw</h1>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">连接中...</span>
  </div>
</header>

<div id="messages">
  <div class="msg system">欢迎使用 Mini-OpenClaw Web UI — 简易版 OpenClaw 架构演示</div>
</div>

<div id="input-area">
  <input type="text" id="input" placeholder="输入消息，按回车发送..." autocomplete="off" />
  <button id="send-btn" onclick="sendMessage()">发送</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  let ws = null;
  let requestId = 0;
  let pendingRequests = new Map();

  // ========== WebSocket 连接 ==========
  // 对应 OpenClaw 的 Gateway Wire Protocol

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws`);

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = '已连接';
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = '已断开，3秒后重连...';
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = '连接错误';
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleMessage(data);
      } catch (e) {
        console.error('解析消息失败:', e);
      }
    };
  }

  /**
   * 处理 Gateway 推送的消息
   * Wire Protocol: { type: 'event'|'res', ... }
   */
  function handleMessage(data) {
    if (data.type === 'event') {
      if (data.event === 'connected') {
        addMessage('system', `已连接到 Gateway (ID: ${data.payload.connectionId})`);
      } else if (data.event === 'processing') {
        showTyping();
      }
    } else if (data.type === 'res') {
      hideTyping();
      if (data.ok && data.payload) {
        const resp = data.payload;
        let text = resp.text || '(无回复)';

        // 构建工具调用信息
        let toolHtml = '';
        if (resp.toolCalls && resp.toolCalls.length > 0) {
          const items = resp.toolCalls.map(tc =>
            `🔧 ${tc.name}(${JSON.stringify(tc.arguments).slice(0, 60)})`
          ).join('\n');
          toolHtml = `<div class="tool-info">${items}</div>`;
        }

        const meta = resp.processingTime
          ? `<div class="meta">⏱ ${resp.processingTime}ms</div>`
          : '';

        addRawMessage('assistant', text + toolHtml + meta);
      } else if (!data.ok) {
        addMessage('system', `错误: ${data.error}`);
      }
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  // ========== 发送消息 ==========

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage('user', text);
    inputEl.value = '';
    sendBtn.disabled = true;
    inputEl.disabled = true;

    // 发送 Wire Protocol 格式的请求
    // idempotencyKey 确保消息不被重复处理
    const id = ++requestId;
    ws.send(JSON.stringify({
      type: 'req',
      id: String(id),
      method: 'send',
      params: {
        text,
        idempotencyKey: `web_${Date.now()}_${id}`,
      },
    }));
  }

  // ========== UI 辅助 ==========

  function addMessage(type, text) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addRawMessage(type, html) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = escapeHtml(html.split('<div')[0]) +
      (html.includes('<div') ? '<div' + html.split('<div').slice(1).join('<div') : '');
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function showTyping() {
    if (document.getElementById('typing')) return;
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // 回车发送
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // 启动连接
  connect();
</script>

</body>
</html>
